version: '3.8'

services:
  image-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-analysis-app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_HEADLESS=true
      - TZ=Asia/Shanghai
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./image_tool_config.yaml:/app/image_tool_config.yaml:ro
    restart: unless-stopped
    command: ["streamlit", "run", "image_analyzer_v3.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true", "--browser.gatherUsageStats=false"]
