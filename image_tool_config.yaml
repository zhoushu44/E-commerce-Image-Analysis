suggestion_prompt: '你正在根据“模式1：单图分析”的结果，为当前这一张电商主图生成详细、可执行、可交付给设计师的优化建议。


  你的核心任务：

  - 不要复述分析过程，而是把分析结果转成“改图决策”。

  - 每条建议都必须回答：改哪里、怎么改、为什么改、优先级、预期改善什么。

  - 建议要具体到画面元素，例如主体、背景、文字、价格、标签、角标、阴影、光源、色块、留白、构图、场景道具。

  - 如果分析结果里没有足够证据，请写“不确定”，并给出验证方法或 A/B 测试变量。


  边界限制：

  - 只基于当前这一张图片和模式1分析结果提出建议。

  - 不做多图对比，不做竞品对比，不做详情页分析。

  - 不要编造图片中不存在的产品、文字、价格或卖点。

  - 不要只说“提升质感”“优化构图”“增强对比”这类空话，必须写成可执行动作。

  - 如果分析结果显示当前图片不是电商商品主图、没有明确商品主体，或更像软件界面/数据图/截图/文档页/表格页，请不要硬套商品主图评分模板。请改用“非商品主图处理格式”输出：1）识别结论；2）为什么不适合按模式1评分；3）如要作为电商主图，需要补齐的商品主体、卖点、价格/促销、背景、信任元素；4）建议重新上传商品主图或按商品主图重做。该场景下不输出虚构分数，不编造商品。


  评分与权重：

  本模式采用“3个主评分项 + 5个诊断项”。

  主评分公式来自主图.canvas：Total CTR Lift=(0.45×Rcolor + 0.3×Rcomposition + 0.25×Rinfo)×23.6%。

  - 颜色突围：45%

  - 构图差异化：30%

  - 文案信息与转化钩子：25%


  诊断项用于决定风险扣分和改图优先级：

  - 主图角色与目标一致性

  - 视觉复杂度与信息杂乱分

  - 背景CCD诊断

  - 阴影光影与边缘真实感

  - 品类平台适配与合规风险


  请严格按以下格式输出：


  一、单图总评

  1. 当前等级：S/A/B/C

  2. 基础分：颜色 /45 + 构图 /30 + 文案信息 /25 = /100

  3. 风险扣分：逐项列出扣分项、扣分值、扣分原因

  4. 最终分：基础分 - 风险扣分 = /100

  5. 主推判断：适合主推 / 可小改后主推 / 需要重改 / 不建议主推

  6. 一句话结论：用一句运营能听懂的话说明最大问题和最大机会


  二、问题优先级排序

  请只列 3-5 个最重要问题，按“权重 × 严重度 × 修改收益”排序。每个问题必须包含：

  - 优先级：P0/P1/P2

  - 所属维度：颜色/构图/文案/角色/复杂度/背景/光影/品类平台/合规

  - 问题描述：具体到画面元素

  - 为什么影响点击：说明影响首屏识别、视觉突围、阅读理解、信任或转化

  - 修改收益：高/中/低

  - 修改成本：低/中/高

  - 立即改法：一句话说明最直接动作


  三、P0 必改方案

  只写最关键的 1-3 条。每条按这个模板输出：

  - 改动对象：

  - 当前问题：

  - 具体改法：

  - 建议参数：如主体占比 70%-80%、文字 7-8 字、文字区域 ≤20%、只保留 1 个高唤醒色块、背景降饱和、加柔和接触阴影等

  - 改完预期：提升颜色突围/主体识别/文案理解/信任感/移动端可读性/合规安全

  - 如果不改的风险：


  四、按画面元素给改图动作

  请逐项输出，不能遗漏：

  1. 主体/产品：放大、缩小、裁切、居中、偏移、换角度、补细节、去遮挡等。

  2. 背景：纯色化、渐变、降饱和、模糊、加暗角、换深色/浅色、减少纹理/道具等。

  3. 颜色/对比：主体和背景明暗差、互补色、强调色、促销色、文字色、边缘描边等。

  4. 文案/卖点：保留哪句、删除哪句、压缩成什么方向、放大/缩小、字体风格、行数、字数。

  5. 价格/促销/标签：是否保留、放哪里、用什么颜色、是否只保留一个高唤醒点。

  6. 信任背书：是否需要加入或弱化，如正品、包邮、售后、材质、认证、销量，但不能堆砌。

  7. 阴影/光影/边缘：是否加接触阴影、柔化边缘、统一光源、加轮廓光、去掉脏阴影。

  8. 留白/比例/移动端：是否裁成 1:1、3:4、4:3，是否减少无效留白，缩略图是否看得清。


