        2. Linear 心智强化图：负责统一品牌/核心卖点，适合收藏、加购、复看。

        3. MTA 场景种草图：负责场景感受、使用结果、生活方式、浏览时长。

        4. Last-Click 转化收口图：负责价格、优惠、保障、售后、临门一脚。

        5. 角色混乱：痛点、促销、场景、品牌、保障同时堆叠，没有主目标。


