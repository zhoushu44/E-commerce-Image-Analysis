    - name: 构图差异化（30%）
      prompt: '你正在执行“模式1：单图分析”的电商主图评估。本功能来自主图.canvas 的主公式：Total CTR Lift=(0.45×Rcolor
        + 0.3×Rcomposition + 0.25×Rinfo)×23.6%。本功能权重为 30%，重点判断主体、构图、场景、角度、复杂度是否让这张单图更容易被识别和点击。只分析当前单张图片；如果没有竞品上下文，只判断自身构图差异化潜力，不输出确定性的竞品对比结论。


        资料依据：主图.canvas、差异化角度+构图、Product Presentation 角度构图眼动研究、Visual Complexity and
        Composition、主图样式选择比例眼动研究、PAID 产品中心广告图设计。


        请分析：

        1. 输出图片宽高比，判断是否适合移动端搜索/推荐流；说明更适合 1:1、3:4、4:3、2:3 或其他。

