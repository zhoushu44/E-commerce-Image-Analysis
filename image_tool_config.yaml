      prompt: '你正在执行“模式1：单图分析”的电商主图风险诊断。本功能检查图片是否符合品类、平台和合规要求，避免高点击低转化或被平台判低质。只分析当前单张图片，不做多图对比。


        资料依据：顶会论文深度拓展研究、ESCM²、拼多多主图视觉要素、电商主图AB测试、平台搜索推荐外部性、第一性原理。


        请分析：

        1. 判断当前图片大致适配的品类风格：标品、非标品、食品生鲜、母婴、家居百货、美妆服饰、3C家电、低价促销品、高客单价产品等。

        2. 判断视觉策略是否符合品类：标品重信任/参数/价格，非标重风格/场景/审美，食品重食欲/新鲜/暖色，母婴重安全/柔和/信任，3C重质感/清晰/科技感。

