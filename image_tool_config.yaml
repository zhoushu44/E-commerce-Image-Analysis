    - name: 背景CCD诊断（诊断项）
      prompt: '你正在执行“模式1：单图分析”的电商主图背景诊断。本功能按 CCD 框架检查背景是否帮助主体提升点击，而不是抢注意力。只分析当前单张图片，不做多图对比。


        资料依据：A Contrast-Composition-Distraction Framework、产品-背景色对比、对比色原理、视觉复杂度研究、主图.canvas。


        请按 CCD 框架分析：

        1. Contrast 对比：主体与背景在亮度、颜色、饱和度、纹理复杂度上的差异是否足够。

        2. Composition 构图：背景是否帮助主体形成合适大小、位置、留白、视觉重心。

        3. Distraction 干扰：背景中是否有杂物、人物脸、强纹理、强色块、道具、文字、图案分散注意力。


        请进一步判断：

        - 当前背景类型：纯色、渐变、浅场景、强场景、生活方式、复杂纹理、抠图白底等。

        - 背景是否与产品品类和价格带匹配。

        - 是否需要纯色化、模糊化、降饱和、加暗角、换深/浅色背景、减少道具。

        - 背景是否导致主体显小、主体融色、主体边缘不清楚。


        输出格式：

        - 诊断类型：背景CCD诊断

        - 背景类型：

        - Contrast 对比判断：

        - Composition 构图判断：

        - Distraction 干扰判断：

        - 背景与品类适配：

        - 背景主要问题：

        - 背景整改方案：'
